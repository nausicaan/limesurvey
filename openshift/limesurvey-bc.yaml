---
kind: Template
apiVersion: template.openshift.io/v1
labels:
  app: limesurvey
  app.kubernetes.io/name: limesurvey
metadata:
  name: "limesurvey-gdx-bc"
objects:
  - kind: ImageStream
    apiVersion: v1
    metadata:
      name: "${NAME}"
    labels:
      app: "${NAME}"
    spec:
      lookupPolicy:
        local: false
  - kind: BuildConfig
    apiVersion: v1
    metadata:
      name: "${NAME}"
      labels:
        buildconfig: "${NAME}"
        app: "${NAME}"
      annotations:
        openshift.io/build-config.name: limesurvey-gdx-bc
        openshift.io/build.number: '1'
        openshift.io/build.pod-name: limesurvey-gdx-1-build
    spec:
      source:
        type: Git
        git:
          uri: https://github.com/nausicaan/limesurvey
        contextDir: backend
      strategy:
        type: Docker
        dockerStrategy:
          dockerfilePath: Dockerfile
          buildArgs:
            - name: DOCKER_REGISTRY
              value: artifacts.developer.gov.bc.ca/docker-remote/library
          pullSecret:
            name: docker-pull-passthru
      completionDeadlineSeconds: 600
      failedBuildsHistoryLimit: 3
      successfulBuildsHistoryLimit: 3
      output:
        to:
          kind: ImageStreamTag
          name: "${NAME}:${VERSION}"
      postCommit: {}
      resources:
        limits:
          cpu: 1200m
          memory: 750Mi
        requests:
          cpu: 500m
          memory: 500Mi
      runPolicy: SerialLatestOnly
parameters:
  - name: NAME
    displayName: Name
    description: The name assigned to all of the objects defined in this template
    required: true
    value: limesurvey-gdx
  - name: VERSION
    displayName: Image version tag
    description: The version tag of the built image
    required: true
    value: latest